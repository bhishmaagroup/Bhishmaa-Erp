{% extends "base.html" %}
{% block title %}Upload Holiday List{% endblock %}

{% block content %}
<div class="container-fluid">

<h4 class="fw-bold mb-3">📄 Upload Holiday List PDF</h4>

<div class="card shadow-sm col-md-6">
<div class="card-body">

<form method="post" enctype="multipart/form-data">

    <label class="form-label fw-bold">
        Select Holiday PDF
    </label>

    <input type="file"
           name="holiday_pdf"
           accept="application/pdf"
           class="form-control mb-3"
           required>

    <button class="btn btn-primary">
        ⬆ Upload & Save
    </button>

    <a href="/dashboard/holiday-notice"
       class="btn btn-outline-secondary ms-2">
       Cancel
    </a>

</form>

<small class="text-muted d-block mt-3">
PDF format: <b>DD-MM-YYYY | Holiday Reason</b>
</small>

</div>
</div>

</div>
{% endblock %}
