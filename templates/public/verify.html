<!DOCTYPE html>
<html>
<head>
  <title>Verify OTP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg,#4f6df5,#6a8cff);
      height: 100vh;
    }

    .card { border-radius: 15px; }

    .otp-box {
      width: 45px;
      height: 50px;
      font-size: 20px;
      text-align: center;
      margin: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .otp-box:focus {
      border-color: #4f6df5;
      box-shadow: 0 0 5px rgba(79,109,245,0.5);
    }
  </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">

  <div class="card p-4 shadow" style="width:380px;">

    <h4 class="text-center mb-3">🔐 OTP Verification</h4>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for c, m in messages %}
        <div class="alert alert-{{ c }}">{{ m }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" id="otpForm">

      <!-- OTP BOXES -->
      <div class="d-flex justify-content-center mb-3">
        <input type="text" maxlength="1" class="otp-box" required>
        <input type="text" maxlength="1" class="otp-box" required>
        <input type="text" maxlength="1" class="otp-box" required>
        <input type="text" maxlength="1" class="otp-box" required>
        <input type="text" maxlength="1" class="otp-box" required>
        <input type="text" maxlength="1" class="otp-box" required>
      </div>

      <!-- Hidden full OTP -->
      <input type="hidden" name="code" id="fullOtp">

      <button class="btn btn-primary w-100">Verify</button>
    </form>

    <!-- TIMER -->
    <div class="text-center mt-3">
      <small>OTP expires in <span id="timer">{{ remaining_time or 300 }}</span>s</small>
    </div>

    <!-- RESEND -->
    <form method="POST" action="{{ url_for('super_admin.resend_otp') }}">
      <button id="resendBtn" class="btn btn-warning w-100 mt-2" disabled>
        Resend OTP
      </button>
    </form>

  </div>

</div>

<script>
const inputs = document.querySelectorAll(".otp-box");

// auto move
inputs.forEach((input, index) => {
  input.addEventListener("input", () => {
    if (input.value.length === 1 && index < inputs.length - 1) {
      inputs[index + 1].focus();
    }
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Backspace" && index > 0 && !input.value) {
      inputs[index - 1].focus();
    }
  });
});

// combine OTP
document.getElementById("otpForm").addEventListener("submit", () => {
  let otp = "";
  inputs.forEach(i => otp += i.value);
  document.getElementById("fullOtp").value = otp;
});

// timer
let time = parseInt(document.getElementById("timer").innerText);
const timerEl = document.getElementById("timer");
const btn = document.getElementById("resendBtn");

const countdown = setInterval(() => {
  time--;
  timerEl.innerText = time;

  if (time <= 0) {
    clearInterval(countdown);
    btn.disabled = false;
  }
}, 1000);
</script>

</body>
</html>
