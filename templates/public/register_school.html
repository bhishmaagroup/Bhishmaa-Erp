<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>School Registration | Bhishmaa ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

```
<style>
    body {
        background: linear-gradient(135deg, #1dbf73, #0b1e3c);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', sans-serif;
    }
    .register-card {
        background: #ffffff;
        width: 100%;
        max-width: 500px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        overflow: hidden;
    }
    .register-header {
        background: #1dbf73;
        color: white;
        padding: 30px;
        text-align: center;
    }
    .form-control { border-radius: 10px; padding: 12px; }
    .btn-register {
        background: #1dbf73;
        color: white;
        border-radius: 10px;
        padding: 12px;
        font-weight: 700;
        border: none;
    }
    .btn-register:hover { background: #158a53; }
</style>
```

</head>

<body>

<div class="register-card">
    <div class="register-header">
        <h3 class="fw-bold mb-0">Apply for Admission</h3>
        <p class="mb-0 opacity-75">Onboard your school to Bhishmaa ERP</p>
    </div>

```
<div class="p-4 p-md-5">

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} small">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">

        <!-- SCHOOL -->
        <div class="mb-3">
            <label class="form-label small fw-bold">School Name</label>
            <input type="text" name="school_name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label small fw-bold">School Code</label>
            <input type="text" name="school_code" class="form-control" required>
        </div>

        <!-- 🔥 NEW EMAIL FIELD -->
        <div class="mb-3">
            <label class="form-label small fw-bold">Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
        </div>

        <hr class="my-4">

        <!-- ADMIN -->
        <div class="mb-3">
            <label class="form-label small fw-bold">Admin Username</label>
            <input type="text" name="admin_username" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label small fw-bold">Admin Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-register w-100 mb-3">
            Submit Application
        </button>

        <div class="text-center">
            <a href="{{ url_for('auth.login') }}" class="small text-muted">
                Already registered? Log in here
            </a>
        </div>

    </form>
</div>
```

</div>

</body>
</html>
