{% extends "base.html" %}
{% block title %}Edit Route{% endblock %}

{% block content %}

<style>
.form-card {
    background: #fff;
    border-radius: 18px;
    padding: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}
.section-title {
    font-weight: 600;
    color: #0d6efd;
    margin-top: 20px;
    margin-bottom: 10px;
}
</style>

<div class="container">

<h4 class="mb-3">✏️ Edit Route</h4>

<form method="post">
<div class="form-card">

<!-- 🗺️ BASIC -->
<div class="section-title">Basic Details</div>
<div class="row g-3">

<div class="col-md-4">
<input name="route_name" class="form-control"
       value="{{ route.route_name }}" placeholder="Route Name">
</div>

<div class="col-md-4">
<input name="route_code" class="form-control"
       value="{{ route.route_code }}" placeholder="Route Code">
</div>

<div class="col-md-4">
<input name="distance_km" class="form-control"
       value="{{ route.distance_km }}" placeholder="Distance (KM)">
</div>

<div class="col-md-6">
<input name="start_point" class="form-control"
       value="{{ route.start_point }}" placeholder="Start Point">
</div>

<div class="col-md-6">
<input name="end_point" class="form-control"
       value="{{ route.end_point }}" placeholder="End Point">
</div>

</div>


<!-- 🚌 BUS MAPPING -->
<div class="section-title">Bus Mapping</div>
<div class="row g-3">

<div class="col-md-6">
<select name="bus_id" class="form-select">
  <option value="">Select Bus</option>
  {% for b in buses %}
    <option value="{{ b.id }}"
      {% if route.bus_id == b.id %}selected{% endif %}>
      {{ b.bus_no }} ({{ b.driver_name }})
    </option>
  {% endfor %}
</select>
</div>

<div class="col-md-6">
<select name="backup_bus_id" class="form-select">
  <option value="">Backup Bus</option>
  {% for b in buses %}
    <option value="{{ b.id }}"
      {% if route.backup_bus_id == b.id %}selected{% endif %}>
      {{ b.bus_no }}
    </option>
  {% endfor %}
</select>
</div>

</div>


<!-- 👨‍✈️ DRIVER -->
<div class="section-title">Driver Details</div>
<div class="row g-3">

<div class="col-md-6">
<input name="driver_name" class="form-control"
       value="{{ route.driver_name }}" placeholder="Driver Name">
</div>

<div class="col-md-6">
<input name="driver_mobile" class="form-control"
       value="{{ route.driver_mobile }}" placeholder="Driver Mobile">
</div>

</div>


<!-- 💰 FEE -->
<div class="section-title">Fee Configuration</div>
<div class="row g-3">

<div class="col-md-6">
<select name="fare_type" class="form-select">
  <option value="one-way"
    {% if route.fare_type=='one-way' %}selected{% endif %}>One Way</option>
  <option value="two-way"
    {% if route.fare_type=='two-way' %}selected{% endif %}>Two Way</option>
</select>
</div>

<div class="col-md-6">
<input name="base_fare" class="form-control"
       value="{{ route.base_fare }}" placeholder="Base Fare ₹">
</div>

</div>


<!-- 🛰️ TRACKING -->
<div class="section-title">Tracking & Safety</div>

<div class="form-check">
  <input class="form-check-input" type="checkbox" name="gps_enabled"
    {% if route.gps_enabled %}checked{% endif %}>
  <label class="form-check-label">Enable GPS Tracking</label>
</div>

<div class="form-check">
  <input class="form-check-input" type="checkbox" name="geofence_enabled"
    {% if route.geofence_enabled %}checked{% endif %}>
  <label class="form-check-label">Enable Geofencing</label>
</div>


<!-- SUBMIT -->
<button class="btn btn-warning mt-4 w-100">
  ✏️ Update Route
</button>

</div>
</form>

</div>

{% endblock %}
