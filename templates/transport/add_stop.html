{% extends "base.html" %}
{% block title %}Add Stop{% endblock %}

{% block content %}

<style>
.form-card {
    background: #fff;
    border-radius: 18px;
    padding: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}
.section-title {
    font-weight: 600;
    color: #0d6efd;
    margin-top: 20px;
}
</style>

<div class="container">

  <h4 class="mb-3">📍 Add Stop</h4>

  <form method="post">
    <div class="form-card">

      <!-- ROUTE -->
      <div class="section-title">Route Selection</div>
      <div class="row g-3">
        <div class="col-md-6">
          <select name="route_id" class="form-select" required>
            <option value="">Select Route</option>
            {% for r in routes %}
              <option value="{{ r.id }}">
                {{ r.route_name }} ({{ r.start_point }} → {{ r.end_point }})
              </option>
            {% endfor %}
          </select>
        </div>
      </div>

      <!-- STOP DETAILS -->
      <div class="section-title">Stop Details</div>
      <div class="row g-3">

        <div class="col-md-4">
          <input name="stop_name" class="form-control" placeholder="Stop Name" required>
        </div>

        <div class="col-md-4">
          <input type="time" name="pickup_time" class="form-control">
        </div>

        <div class="col-md-4">
          <input type="number" name="sequence" class="form-control" placeholder="Stop Order (1,2,3)">
        </div>

        <div class="col-md-4">
          <input type="number" step="0.1" name="distance_km" class="form-control" placeholder="Distance (KM)">
        </div>

        <div class="col-md-4">
          <input type="number" name="fare" class="form-control" placeholder="Stop Fare ₹">
        </div>

      </div>

      <!-- SUBMIT -->
      <button class="btn btn-success mt-4 w-100">
        ➕ Add Stop
      </button>

    </div>
  </form>

</div>

{% endblock %}
