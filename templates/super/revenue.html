<!DOCTYPE html>
<html lang="en">
<head>
  <title>Revenue Analytics</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f4f7fe; font-family: 'Inter', sans-serif; }
    .neo-card { background: #ffffff; border-radius: 20px; border: none; box-shadow: 0 8px 24px rgba(112, 144, 176, 0.1); padding: 25px; }
    .text-success-custom { color: #1dbf73; }
  </style>
</head>
<body>
<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold"><i class="fa-solid fa-file-invoice-dollar text-success me-2"></i>Revenue Logs</h3>
    <a href="{{ url_for('super_admin.dashboard') }}" class="btn btn-outline-secondary">Back</a>
  </div>

  <div class="neo-card">
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="bg-light">
          <tr>
            <th>Date</th>
            <th>School</th>
            <th>Plan</th>
            <th>Transaction ID</th>
            <th>Amount</th>
          </tr>
        </thead>
        <tbody>
          {% for p in recent_payments %}
          <tr>
            <td>{{ p.timestamp.strftime('%Y-%m-%d %H:%M') }}</td>
            <td class="fw-bold">{{ p.school.school_name }}</td>
            <td><span class="badge bg-primary bg-opacity-10 text-primary">{{ p.plan_name|upper }}</span></td>
            <td class="text-muted"><small>{{ p.transaction_id }}</small></td>
            <td class="fw-bold text-success-custom">₹{{ p.amount }}</td>
          </tr>
          {% else %}
          <tr><td colspan="5" class="text-center py-4">No payments recorded yet.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
