<!DOCTYPE html>
<html lang="en">
<head>
  <title>Manage Users - {{ school.school_name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f4f7fe; font-family: 'Inter', sans-serif; }
    .neo-card { background: #ffffff; border-radius: 20px; border: none; box-shadow: 0 8px 24px rgba(112, 144, 176, 0.1); padding: 25px; }
    .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
  </style>
</head>
<body>
<div class="container py-4">
  <div class="neo-card">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="fw-bold"><i class="fa-solid fa-users text-primary me-2"></i> {{ school.school_name }} Directory</h4>
      <form class="d-flex gap-2">
        <input type="text" name="q" class="form-control form-control-sm" placeholder="Search users..." value="{{ q }}">
        <button class="btn btn-primary btn-sm px-3">Search</button>
      </form>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead>
          <tr class="text-muted small uppercase">
            <th>User</th>
            <th>Role</th>
            <th>Status</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody>
          {% for u in users %}
          <tr>
            <td class="fw-bold">{{ u.username }}</td>
            <td><span class="badge bg-light text-dark border">{{ u.role|upper }}</span></td>
            <td>
              {% if u.is_active %}
                <span class="status-dot bg-success"></span> Active
              {% else %}
                <span class="status-dot bg-danger"></span> Blocked
              {% endif %}
            </td>
            <td class="text-end">
                <div class="btn-group">
                  <form method="post" action="{{ url_for('super_admin.toggle_user', id=u.id) }}">
                    <button class="btn btn-sm btn-outline-secondary me-1" title="Toggle Access">
                        <i class="fa-solid {% if u.is_active %}fa-lock{% else %}fa-unlock{% endif %}"></i>
                    </button>
                  </form>
                  <form method="post" action="{{ url_for('super_admin.delete_user', id=u.id) }}" onsubmit="return confirm('Delete permanently?')">
                    <button class="btn btn-sm btn-outline-danger"><i class="fa-solid fa-trash"></i></button>
                  </form>
                </div>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
