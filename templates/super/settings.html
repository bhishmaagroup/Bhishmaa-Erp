<!DOCTYPE html>
<html lang="en">
<head>
  <title>System Settings</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">
<div class="container">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold">Global System Settings</h3>
    <a href="{{ url_for('super_admin.dashboard') }}" class="btn btn-secondary">Back to Dashboard</a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-4">
      <form method="POST">
        
        <h5 class="text-primary border-bottom pb-2 mb-3">Email Gateway (SMTP)</h5>
        <div class="row mb-4">
          <div class="col-md-6">
            <label class="form-label text-muted fw-bold">SMTP Host</label>
            <input type="text" name="SMTP_HOST" class="form-control" value="{{ settings.get('SMTP_HOST', 'smtp.gmail.com') }}">
          </div>
          <div class="col-md-6">
            <label class="form-label text-muted fw-bold">SMTP Port</label>
            <input type="text" name="SMTP_PORT" class="form-control" value="{{ settings.get('SMTP_PORT', '587') }}">
          </div>
        </div>

        <h5 class="text-success border-bottom pb-2 mb-3">Payment Gateway (Stripe/Razorpay)</h5>
        <div class="row mb-4">
          <div class="col-md-6">
            <label class="form-label text-muted fw-bold">Public Key</label>
            <input type="text" name="PAYMENT_PUB_KEY" class="form-control" value="{{ settings.get('PAYMENT_PUB_KEY', '') }}">
          </div>
          <div class="col-md-6">
            <label class="form-label text-muted fw-bold">Secret Key</label>
            <input type="password" name="PAYMENT_SEC_KEY" class="form-control" value="{{ settings.get('PAYMENT_SEC_KEY', '') }}">
          </div>
        </div>

        <button type="submit" class="btn btn-primary px-4 fw-bold">Save Configuration</button>
      </form>
    </div>
  </div>

</div>
</body>
</html>
