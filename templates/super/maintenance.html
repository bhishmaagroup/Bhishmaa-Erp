<!DOCTYPE html>
<html lang="en">
<head>
    <title>System Maintenance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">
<div class="container">
    <h3 class="fw-bold mb-4"><i class="fa-solid fa-screwdriver-wrench me-2"></i>Platform Maintenance</h3>
    
    <div class="row g-4">
        <div class="col-md-6">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body">
                    <h5 class="fw-bold">Audit Log Cleanup</h5>
                    <p class="text-muted small">Current Log Count: <strong>{{ log_count }}</strong></p>
                    <form action="{{ url_for('super_admin.cleanup_logs') }}" method="POST">
                        <select name="days" class="form-select mb-3">
                            <option value="30">Delete logs older than 30 days</option>
                            <option value="90">Delete logs older than 90 days</option>
                        </select>
                        <button class="btn btn-danger w-100">Purge Old Logs</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body">
                    <h5 class="fw-bold">Database Health</h5>
                    <p class="text-muted small">Run VACUUM to reclaim storage and optimize indices.</p>
                    <a href="{{ url_for('super_admin.optimize_db') }}" class="btn btn-primary w-100">
                        <i class="fa-solid fa-bolt me-2"></i>Optimize Database
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
