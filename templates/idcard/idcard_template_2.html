<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; }

        .id-card {
            width: 214px;
            height: 340px;
            border: 1px solid #000;
            font-family: Arial;
            text-align: center;
            padding: 6px;
        }

        .school-name {
            font-size: 13px;
            font-weight: bold;
            border-bottom: 1px solid #000;
            margin-bottom: 6px;
        }

        .photo {
            width: 90px;
            height: 110px;
            border: 1px solid #000;
            margin: auto;
        }

        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info {
            font-size: 11px;
            margin-top: 6px;
            text-align: left;
        }

        .sign {
            margin-top: 10px;
            font-size: 9px;
        }
    </style>
</head>

<body>
<div class="id-card">

    <div class="school-name">
        {{ school.school_name }}
    </div>

    <div class="photo">
        {% if student.photo %}
            <img src="{{ student.photo }}">
        {% endif %}
    </div>

    <div class="info">
        <b>Name:</b> {{ student.first_name }} {{ student.middle_name or "" }} {{ student.last_name }}<br>
        <b>Class:</b> {{ student.student_class }} {{ student.section }}<br>
        <b>Adm:</b> {{ student.admission_no }}
    </div>

    <div class="sign">
        Principal Signature
    </div>

</div>
</body>
</html>
