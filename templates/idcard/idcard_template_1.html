<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        .id-card {
            width: 340px;
            height: 214px;
            border: 1px solid #000;
            font-family: Arial, sans-serif;
            position: relative;
            padding: 6px;
        }

        .school-header {
            text-align: center;
            font-weight: bold;
            font-size: 12px;
            border-bottom: 1px solid #000;
            padding-bottom: 3px;
        }

        .card-body {
            display: flex;
            margin-top: 6px;
        }

        .photo {
            width: 80px;
            height: 95px;
            border: 1px solid #000;
            margin-right: 6px;
        }

        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .details {
            font-size: 10px;
            line-height: 1.4;
        }

        .footer {
            position: absolute;
            bottom: 4px;
            right: 6px;
            font-size: 9px;
        }
    </style>
</head>

<body>
<div class="id-card">

    <div class="school-header">
        {{ school.school_name }}<br>
        {{ school.city }}
    </div>

    <div class="card-body">
        <div class="photo">
            {% if student.photo %}
                <img src="{{ student.photo }}">
            {% endif %}
        </div>

        <div class="details">
            <b>Name:</b> {{ student.first_name }} {{ student.middle_name or "" }} {{ student.last_name }}<br>
            <b>Class:</b> {{ student.student_class }} {{ student.section }}<br>
            <b>Adm No:</b> {{ student.admission_no }}<br>
            <b>DOB:</b> {{ student.dob }}
        </div>
    </div>

    <div class="footer">
        Principal Sign
    </div>

</div>
</body>
</html>
