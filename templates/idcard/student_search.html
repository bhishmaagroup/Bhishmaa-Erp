{% extends "base.html" %}
{% block content %}

<h4>🎓 Student ID Card Generator</h4>

<form method="get" class="row g-2 mb-3">
    <div class="col-md-3">
        <input type="text" name="q" class="form-control"
               placeholder="Name / Admission No">
    </div>
    <div class="col-md-2">
        <input type="text" name="class" class="form-control" placeholder="Class">
    </div>
    <div class="col-md-2">
        <input type="text" name="section" class="form-control" placeholder="Section">
    </div>
    <div class="col-md-2">
        <button class="btn btn-primary">Search</button>
    </div>
</form>

<table class="table table-bordered">
<tr>
<th>#</th><th>Name</th><th>Class</th><th>Action</th>
</tr>
{% for s in students %}
<tr>
<td>{{ loop.index }}</td>
<td>{{ s.first_name }} {{ s.last_name }}</td>
<td>{{ s.student_class }}-{{ s.section }}</td>
<td>
    <a href="/id-card/student/{{ s.id }}/pdf"
       class="btn btn-sm btn-danger">PDF</a>
</td>
</tr>
{% endfor %}
</table>

{% endblock %}
