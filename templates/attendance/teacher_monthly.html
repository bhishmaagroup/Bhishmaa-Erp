{% extends "base.html" %}
{% block content %}

<h4 class="fw-bold mb-3">📅 Monthly Teacher Attendance</h4>

<table class="table table-bordered text-center table-sm">
<thead class="table-dark">
<tr>
{% for d in days %}
    <th>{{ d.day }}</th>
{% endfor %}
</tr>
</thead>
<tbody>
<tr>
{% for d in days %}
    {% set st = attendance.get(d) %}
    {% if d.weekday() == 6 %}
        <td class="bg-secondary"></td>
    {% elif st == "A" %}
        <td class="bg-danger text-white fw-bold">A</td>
    {% else %}
        <td class="fw-bold">{{ st or "" }}</td>
    {% endif %}
{% endfor %}
</tr>
</tbody>
</table>

{% endblock %}
