<!DOCTYPE html>
<html>

<head>
    <title>Face Attendance</title>
</head>

<body>

<h2>Face Attendance</h2>

<form
    action="/face-checkin"
    method="POST"
    enctype="multipart/form-data"
>

    <input
        type="number"
        name="teacher_id"
        placeholder="Teacher ID"
        required
    >

    <input
        type="hidden"
        name="latitude"
        id="latitude"
    >

    <input
        type="hidden"
        name="longitude"
        id="longitude"
    >

    <input
        type="file"
        name="image"
        accept="image/*"
        required
    >

    <button type="submit">
        Mark Attendance
    </button>

</form>

<script>

navigator.geolocation.getCurrentPosition(
    function(position){

        document.getElementById("latitude").value =
            position.coords.latitude;

        document.getElementById("longitude").value =
            position.coords.longitude;
    }
);

</script>

</body>
</html>
