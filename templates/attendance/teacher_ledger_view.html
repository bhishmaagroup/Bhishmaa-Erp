{% extends "base.html" %}
{% block content %}

<h4 class="fw-bold mb-3">📘 Teacher Ledger</h4>
<div class="mb-3">
   <a href="/attendance/teacher/ledger/{{ teacher.id }}/pdf"
   class="btn btn-danger btn-sm">
   📄 PDF
</a>

    <a href="/attendance/teacher/ledger/{{ teacher.id }}/excel"
       class="btn btn-success btn-sm">
       📊 Excel
    </a>
</div>


<form method="get" class="row g-2 mb-3">
    <div class="col-md-3">
        <input type="date" name="from" class="form-control"
               value="{{ request.args.get('from','') }}">
    </div>
    <div class="col-md-3">
        <input type="date" name="to" class="form-control"
               value="{{ request.args.get('to','') }}">
    </div>
    <div class="col-md-2">
        <button class="btn btn-primary">Filter</button>
    </div>
</form>

<table class="table table-bordered text-center">
<thead class="table-light">
<tr>
    <th>Date</th>
    <th>Status</th>
</tr>
</thead>
<tbody>
{% for r in records %}
<tr class="{% if r.status=='A' %}table-danger{% endif %}">
    <td>{{ r.attendance_date.strftime('%d-%m-%Y') }}</td>
    <td class="fw-bold">{{ r.status }}</td>
</tr>
{% endfor %}
</tbody>
</table>

<div class="mt-3">
    <b>P:</b> {{ P }} &nbsp;
    <b>A:</b> {{ A }} &nbsp;
    <b>L:</b> {{ L }} &nbsp;
    <b>H:</b> {{ H }} &nbsp;
    <b>%:</b> {{ percent }}%
</div>

<a href="/attendance/teacher/ledger" class="btn btn-secondary mt-3">
    ← Back
</a>

{% endblock %}
