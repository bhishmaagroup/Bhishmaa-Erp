{% extends "base.html" %}
{% block title %}Attendance{% endblock %}

{% block content %}
<div class="container-fluid">

<h4 class="fw-bold mb-4">📅 Attendance Management</h4>

<div class="row g-4">

    <div class="col-md-6">
        <div class="card shadow-sm text-center">
            <div class="card-body">
                <h5 class="fw-bold">👩‍🏫 Teacher Attendance</h5>
                <p class="text-muted">Mark daily teacher attendance</p>
                <a href="/attendance/teacher" class="btn btn-success">
                    Open
                </a>
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card shadow-sm text-center">
            <div class="card-body">
                <h5 class="fw-bold">🎓 Student Attendance</h5>
                <p class="text-muted">Class & section wise attendance</p>
                <a href="/attendance/student" class="btn btn-primary">
                    Open
                </a>
            </div>
        </div>
    </div>

</div>
</div>
{% endblock %}
