{% extends "base.html" %}

{% block title %}Print Admit Cards - Bhishmaa ERP{% endblock %}

{% block content %}
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div>
            <h3 class="fw-bold mb-1">📇 Bulk Admit Cards</h3>
            <p class="text-muted mb-0">Select class and exam to export student admit cards in PDF format</p>
        </div>
        <div>
            <a href="/exam/" class="btn btn-outline-dark btn-sm">
                <i class="fa fa-arrow-left me-1"></i> Back to Exams
            </a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm neo-card">
                <div class="card-body p-3">
                    <h5 class="fw-bold mb-4"><i class="fa fa-print text-primary me-2"></i>Print Parameters</h5>
                    <form method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Choose Exam</label>
                            <select name="exam_id" class="form-select" required>
                                <option value="">Select Exam</option>
                                {% for e in exams %}
                                <option value="{{ e.id }}">{{ e.name }} (Class {{ e.class_name }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Section Filter (Optional)</label>
                            <select name="section" class="form-select">
                                <option value="">All Sections</option>
                                {% for s in ["A","B","C","D"] %}
                                <option value="{{ s }}">Section {{ s }}</option>
                                {% endfor %}
                            </select>
                            <div class="form-text text-muted">Leave empty to compile all sections together.</div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 btn-lg mt-3">
                            <i class="fa fa-file-pdf me-1"></i> Generate & Download PDF
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
