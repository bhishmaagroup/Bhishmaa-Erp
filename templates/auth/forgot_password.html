<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark d-flex justify-content-center align-items-center" style="height:100vh;">

<div class="card p-4" style="width:350px;">
    <h4 class="text-center mb-3">Forgot Password</h4>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post">
        <input name="school_code" placeholder="School Code" required class="form-control mb-3">
        <input name="username" placeholder="Username" required class="form-control mb-3">

        <button class="btn btn-primary w-100">Send OTP</button>
    </form>

    <div class="text-center mt-3">
        <a href="{{ url_for('auth.login') }}">Back to Login</a>
    </div>
</div>

</body>
</html>
