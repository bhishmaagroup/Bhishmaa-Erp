{% extends "base.html" %}

{% block title %}Allocate Timetable Slot - Bhishmaa ERP{% endblock %}

{% block content %}
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div>
            <h3 class="fw-bold mb-1">📅 Configure Period Slot</h3>
            <p class="text-muted mb-0">Class: <strong>{{ class_name }}-{{ section }}</strong> | Day: <strong>{{ day }}</strong> | Period: <strong>{{ period }}</strong></p>
        </div>
        <div>
            <a href="/timetable/?class_name={{ class_name }}&section={{ section }}" class="btn btn-outline-dark btn-sm">
                <i class="fa fa-arrow-left me-1"></i> Back to Grid
            </a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm neo-card">
                <div class="card-body p-3">
                    <h5 class="fw-bold mb-4"><i class="fa fa-clock text-primary me-2"></i>Slot Parameters</h5>
                    <form method="post">
                        <input type="hidden" name="class_name" value="{{ class_name }}">
                        <input type="hidden" name="section" value="{{ section }}">
                        <input type="hidden" name="day_of_week" value="{{ day }}">
                        <input type="hidden" name="period_no" value="{{ period }}">

                        <div class="row g-3">
                            <div class="col-6">
                                <label class="form-label fw-semibold">Start Time</label>
                                <input type="time" name="start_time" class="form-control" value="08:00" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-semibold">End Time</label>
                                <input type="time" name="end_time" class="form-control" value="08:45" required>
                            </div>
                        </div>

                        <div class="mb-3 mt-3">
                            <label class="form-label fw-semibold">Subject</label>
                            <select name="subject_id" class="form-select" required>
                                <option value="">Select Subject</option>
                                {% for sub in subjects %}
                                <option value="{{ sub.id }}">{{ sub.subject_name }} ({{ sub.subject_code or 'No Code' }})</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Teacher</label>
                            <select name="teacher_id" class="form-select" required>
                                <option value="">Select Teacher</option>
                                {% for t in teachers %}
                                <option value="{{ t.id }}">{{ t.first_name }} {{ t.last_name or '' }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Room No (Optional)</label>
                            <select name="room_id" class="form-select">
                                <option value="">Choose Room</option>
                                {% for r in rooms %}
                                <option value="{{ r.id }}">{{ r.room_no }} (Cap: {{ r.capacity }})</option>
                                {% endfor %}
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 btn-lg mt-3">
                            <i class="fa fa-save me-1"></i> Save Allocation
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
